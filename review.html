<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie-Review</title>
    <style>
         @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Science+Gothic:wght@100..900&display=swap');
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: "Roboto", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            background-color: rgba(32, 31, 31, 0.144);
        }

        .rating-box{
            width: 500px;
            height: 400px;
            background-color: #ccc;
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 7px 10px 5px rgba(0, 0, 0, 0.356)
            

        }

         .rating-box h2{
            text-align: center;
         }

         .stars{
            text-align: center;
            margin-bottom: 10px;
         }

         .star{
            font-size: 30px;
            color: #6d6767;
            cursor: pointer;
            margin-left: 5px;
         }

         .button:hover{
            opacity: 0.8;
         }

         .review-list{
            width: 390px;
           
            margin: 20px auto;
         }

         .star.active{
            color: gold;
         }

         textarea{
            width: 100%;
            height: 200px;
            margin-top: 10px;
            padding: 10px;
            resize: none;
            border-radius: 5px;
            font-size: 15px;
         }

         button{
            width: 100%;
            height: 30px;
            margin-top: 10px;
            padding: 5px;
            background-color: #fff;
            border-radius: 10px;
            border: none;
            cursor: pointer;
         }

         .review-box{
            background-color:white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
         
            box-shadow: 6px 6px 3px rgba(0, 0, 0, 0.459);
        
         }

         .review-star{
            color: gold;
            margin-bottom: 9px;
            font-size: 10px;
         }

    </style>
</head>
<body>
    <div class="rating-box">
        <h2 style="text-align: center; font-weight: 500; font-family: Verdana, Geneva, Tahoma, sans-serif; font-size: 14px;">Share your feedback...😊</h2>
        <div class="stars">
            <i class="star" data-value="1">&#9733;</i>
            <i class="star" data-value="2">&#9733;</i>
            <i class="star" data-value="3">&#9733;</i>
            <i class="star" data-value="4">&#9733;</i>
            <i class="star" data-value="5">&#9733;</i>
        </div>
        <p id="rating-value">Your Rating:0</p>
        <textarea name="" id="feedback" placeholder="Write your feedback..... 🥺"></textarea>
        <button onclick="submitreview()">Submit Review</button>
    </div>

    <h2 style="text-align: center;">Customer Reviews</h2>
    <div id="review-list" class="review-list"></div>


    <script>
        let selectedrating=0;   
        const stars = document.querySelectorAll(".star");
        stars.forEach((star)=>{
            star.addEventListener("click",()=>{
                selectedrating =star.getAttribute("data-value");
            updatestars();
            document.getElementById("rating-value").innerText="Your rating" + selectedrating;
            });
        }) 

        function updatestars(){
            stars.forEach((star)=>{
                star.classList.remove("active");
                if(star.getAttribute("data-value")<=selectedrating){
                    star.classList.add("active");
                }
            });
        }

        function submitreview(){
            let feedback=document.getElementById("feedback").value;
            let reviewlist=document.getElementById("review-list");

            if(selectedrating==0){
                alert("Please Select Your Rating...👀");
                return;
            }

            if(feedback.trim()===""){
                alert("Please Enter Your Review....😊!");
                return;
            }
       

        let newreview=document.createElement("div");
        newreview.classList.add("review-box");

        let startext="";
        for(let i=0;i<selectedrating;i++){
            startext += "&#9733;";
        }

        newreview.innerHTML=`
        <div class="review-stars">${startext} </div>
        <p>${feedback}</p> `;

        reviewlist.prepend(newreview);

        selectedrating=0;
        updatestars();
        document.getElementById("rating-value").innerText="Your rating: 0";
        document.getElementById("feedback").value="";
         }
      
    </script>
</body>
</html>
