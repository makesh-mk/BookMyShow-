<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #3533335b;
        height: 100%;
        width: 100%;
      }
      .parent {
        height: 40vh;
        width: 20vw;
        background: #6968686b;
        box-shadow: 5px 7px 4px rgba(0, 0, 0, 0.438);
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        margin: 10% auto;
        border-radius: 10px;
      }

      .child {
      }
      h2 {
        text-align: center;
        margin-bottom: 20px;
        letter-spacing: 0.2px;
      }
      form {
        text-align: center;
      }

      .box {
        height: 20px;
        margin: 5px;
        padding: 5px;
        border-radius: 2px;
        border: none;
        outline: none;
      }

      .new {
        text-decoration: none;
        color: #ccc;
        transition: all 0.2s linear;
      }

      .new:hover {
        color: rgba(0, 255, 255, 0.568);
        transform: translateY(-4px);
      }

      .btn-sub {
        width: 130px;
        outline: none;
        margin: 10px 5px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        height: 25px;
      }

      .btn-sub:hover {
        background-color: rgb(47, 255, 245);
        color: rgb(44, 40, 40);
      }
    </style>
  </head>
  <body>
    <section>
      <div class="parent">
        <div class="child">
          <h2>Login</h2>
          <form action="" id="submit">
            <label for="">Username :</label><br />
            <input
              type="text"
              placeholder="Enter Your Name..."
              class="box"
              id="name"
            /><br /><br />

            <label for="">Password :</label><br />
            <input
              type="password"
              placeholder="Enter Your Password..."
              class="box"
              id="pass"
            />
            <br />

            <button class="btn-sub" id="submit">Submit</button>

            <hr />
            <br />

            <a href="" class="new">Create a New Account </a>
          </form>
        </div>
      </div>
    </section>

    <script>
      const submit = document.getElementById("submit");
      submit.addEventListener("submit", (e) => {
        const name = document.getElementById("name").value;
        const pass = document.getElementById("pass").value;
        e.preventDefault();
        let username = "Makesh";
        let password = "2526";

        if (name == username && password == pass) {
          alert("The Login is Successfully");
        } else {
          alert("The Login is failed...!");
          console.log(e.errormessage());
        }
      });
    </script>
  </body>
</html>
