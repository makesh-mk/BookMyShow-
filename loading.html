<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #fullscreen-loader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background-color: #1F2533; /* dark bg */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  color: white;
}

/* SVG animation */
.svg-loader {
  width: 60px;
  height: 60px;
}

.svg-loader circle {
  fill: none;
  stroke: #F84464;
  stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 125;
  stroke-dashoffset: 0;
  animation: dash 1.5s ease-in-out infinite;
}

@keyframes dash {
  0% {
    stroke-dashoffset: 125;
  }
  50% {
    stroke-dashoffset: 62;
    transform: rotate(135deg);
  }
  100% {
    stroke-dashoffset: 0;
    transform: rotate(450deg);
  }
}

p {
  margin-top: 15px;
  font-size: 14px;
  letter-spacing: 1px;
}

    </style>
</head>
<body>
    <div id="fullscreen-loader">
  <svg class="svg-loader" viewBox="0 0 50 50">
    <circle cx="25" cy="25" r="20"></circle>
  </svg>
  <p>Loading movies...</p>
</div>

<script>
  setTimeout(() => {
    document.getElementById("fullscreen-loader").style.display = "none";
  }, 2000);
</script>

</body>
</html>
